<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>중간고사 성적 확인</title>

<style>
:root{--primary:#2563eb;--bg:#f8fafc;--card:#ffffff;--text:#1e293b;--border:#e2e8f0;}
body{font-family:'Pretendard',sans-serif;background-color:var(--bg);color:var(--text);margin:0;padding:20px;display:flex;justify-content:center;align-items:center;min-height:100vh;}
.container{width:100%;max-width:500px;}
.header{text-align:center;margin-bottom:40px;}
.header h1{margin:0;font-size:2.2rem;color:var(--primary);}
.search-box{background:var(--card);padding:30px;border-radius:16px;box-shadow:0 10px 15px -3px rgba(0,0,0,0.1);display:flex;gap:10px;margin-bottom:20px;}
input{flex:1;padding:15px;border:2px solid var(--border);border-radius:10px;font-size:1.1rem;}
button{padding:15px 25px;background:var(--primary);color:white;border:none;border-radius:10px;cursor:pointer;font-weight:bold;}
.result-card{background:var(--card);padding:40px;border-radius:16px;box-shadow:0 20px 25px -5px rgba(0,0,0,0.1);display:none;text-align:center;}
.score{font-size:3rem;font-weight:bold;color:var(--primary);margin-top:20px;}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>📊 중간고사 성적 확인</h1>
<p>이름을 입력하면 점수를 확인할 수 있습니다.</p>
</div>

<div class="search-box">
<input type="text" id="studentName" placeholder="예: 홍길동">
<button onclick="searchScore()">조회</button>
</div>

<div id="resultCard" class="result-card">
<h2 id="resName">이름</h2>
<div class="score" id="resScore">0점</div>
</div>

</div>

<script>
let studentDb = {};

window.onload = function () {
    loadJson();

    document.getElementById('studentName')
        .addEventListener('keydown', e => {
            if (e.key === 'Enter') searchScore();
        });
};

// ✅ score.json 로딩
function loadJson() {
    fetch("score.json", { cache: "no-store" })
        .then(r => r.json())
        .then(data => {
            studentDb = data.reduce((acc, curr) => {
                acc[curr.name] = curr.score;
                return acc;
            }, {});
        })
        .catch(e => {
            console.error('데이터 로딩 오류:', e);
            alert('score.json 파일을 불러올 수 없습니다.');
        });
}

// ✅ 검색
function searchScore() {
    const nameInput = document.getElementById('studentName');
    const name = nameInput.value.trim();
    const card = document.getElementById('resultCard');

    if (!name) {
        alert('이름을 입력해 주세요.');
        return;
    }

    const score = studentDb[name];

    if (score !== undefined) {
        document.getElementById('resName').innerText = name + " 학생";
        document.getElementById('resScore').innerText = score + "점";
        card.style.display = 'block';
    } else {
        alert('등록되지 않은 이름입니다.');
        card.style.display = 'none';
    }
}
</script>

</body>
</html>
